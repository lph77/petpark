  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Pet Park">
  <meta name="theme-color" content="#FF8A7A">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#FFF6EC;
    --peach:#FFE3D3;
    --coral:#FF8A7A;
    --coral-deep:#F2674F;
    --mint:#9EE6C6;
    --mint-deep:#4FBF93;
    --sky:#9AD7FF;
    --sky-deep:#4FA8E8;
    --sun:#FFD66B;
    --sun-deep:#F4B53D;
    --lav:#C9B6FF;
    --lav-deep:#9277E0;
    --ink:#5A4A42;
    --ink-soft:#8C7A70;
    --white:#FFFFFF;
    --shadow:rgba(120,80,60,.18);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
  html,body{height:100%;}
  body{
    font-family:'Nunito',sans-serif;
    background:
      radial-gradient(circle at 18% 12%, #FFF1E0 0%, transparent 45%),
      radial-gradient(circle at 85% 8%, #FFE9F0 0%, transparent 40%),
      linear-gradient(180deg,#FFF6EC 0%, #FFE9DD 100%);
    color:var(--ink);
    overflow:hidden;
    user-select:none;
    -webkit-user-select:none;
    touch-action:manipulation;
  }
  #app{
    max-width:480px;margin:0 auto;height:100dvh;
    display:flex;flex-direction:column;position:relative;
    overflow:hidden;
  }

  /* ---------- TOP BAR ---------- */
  .topbar{
    display:flex;align-items:center;justify-content:space-between;
    padding:14px 16px 8px;flex-shrink:0;
  }
  .hearts-pill{
    display:flex;align-items:center;gap:7px;
    background:var(--white);
    border-radius:999px;padding:7px 16px 7px 12px;
    box-shadow:0 4px 0 var(--shadow);
    font-family:'Baloo 2';font-weight:800;font-size:22px;color:var(--coral-deep);
  }
  .hearts-pill .hp-icon{font-size:22px;transform:translateY(-1px);}
  .top-right{display:flex;gap:8px;}
  .icon-btn{
    width:46px;height:46px;border:none;border-radius:16px;
    background:var(--white);box-shadow:0 4px 0 var(--shadow);
    font-size:22px;cursor:pointer;display:grid;place-items:center;
    transition:transform .08s;
  }
  .icon-btn:active{transform:translateY(3px);box-shadow:0 1px 0 var(--shadow);}

  /* ---------- STAGE / PET ---------- */
  .stage{
    flex:1;position:relative;display:flex;flex-direction:column;
    align-items:center;justify-content:flex-start;padding:4px 16px 0;
    min-height:0;
  }
  .pet-name-tag{
    font-family:'Baloo 2';font-weight:800;font-size:24px;color:var(--ink);
    background:var(--white);padding:4px 18px;border-radius:999px;
    box-shadow:0 4px 0 var(--shadow);margin-bottom:2px;cursor:pointer;
    display:flex;align-items:center;gap:7px;transition:transform .08s;
  }
  .pet-name-tag:active{transform:scale(.96);}
  .rename-pencil{font-size:14px;opacity:.55;}
  .stage-badge{
    font-family:'Nunito';font-weight:800;font-size:12px;color:var(--white);
    background:var(--lav-deep);padding:2px 9px;border-radius:999px;
  }
  .pet-yard{
    flex:1;width:100%;display:flex;align-items:center;justify-content:center;
    position:relative;min-height:0;
  }
  .pet-shadow{
    position:absolute;bottom:14%;width:130px;height:26px;border-radius:50%;
    background:rgba(120,80,60,.14);filter:blur(2px);
  }
  .pet-stack{
    position:relative;display:flex;align-items:flex-end;justify-content:center;
    animation:idle 2.6s ease-in-out infinite;z-index:2;
  }
  .pet-stack.happy{animation:happyhop .5s ease-in-out infinite;}
  .pet-stack.welcome{animation:welcomewiggle .4s ease-in-out 4;}
  .pet{
    font-size:130px;cursor:pointer;line-height:1;
    filter:drop-shadow(0 8px 6px rgba(120,80,60,.18));
    transition:transform .1s;position:relative;z-index:2;
  }
  .pet:active{transform:scale(.93);}
  .pet-wear{position:absolute;left:50%;line-height:1;pointer-events:none;
    filter:drop-shadow(0 3px 3px rgba(120,80,60,.22));}
  .pet-hat{top:0;transform:translate(-50%,-32%);z-index:4;font-size:54px;}
  .pet-neck{bottom:0;transform:translate(-50%,28%);z-index:3;font-size:44px;}
  .pet-back{top:50%;transform:translate(-50%,-50%);z-index:1;font-size:130px;opacity:.95;}
  .pet-stack.growpop{animation:growpop .7s cubic-bezier(.2,1.6,.4,1);}
  @keyframes growpop{0%{transform:scale(.7);}55%{transform:scale(1.25);}100%{transform:scale(1);}}
  @keyframes idle{0%,100%{transform:translateY(0) rotate(-1deg) scale(1);}50%{transform:translateY(-14px) rotate(1deg) scale(1.02);}}
  .pet.happy{animation:happyhop .5s ease-in-out infinite;}
  @keyframes happyhop{0%,100%{transform:translateY(0) scale(1);}30%{transform:translateY(-32px) scale(1.06);}60%{transform:translateY(0) scale(.98);}}
  .pet.welcome{animation:welcomewiggle .4s ease-in-out 4;}
  @keyframes welcomewiggle{0%,100%{transform:rotate(0) scale(1.05);}25%{transform:rotate(-9deg) scale(1.05);}75%{transform:rotate(9deg) scale(1.05);}}

  /* growth bar */
  .grow-wrap{width:78%;margin:0 auto 2px;text-align:center;}
  .grow-bar{height:8px;border-radius:999px;background:#EFE0D5;overflow:hidden;
    box-shadow:inset 0 1px 2px rgba(120,80,60,.18);}
  .grow-fill{height:100%;width:0;border-radius:999px;
    background:linear-gradient(90deg,#9EE6C6,#4FBF93);transition:width .5s ease;}
  .grow-label{font-size:11px;font-weight:800;color:var(--ink-soft);margin-top:2px;
    text-shadow:0 1px 2px rgba(255,255,255,.45);}

  /* room props */
  .prop-layer{position:absolute;inset:0;z-index:1;pointer-events:none;}
  .prop-layer.lift{z-index:7;}
  .prop{position:absolute;line-height:1;transform:translate(-50%,-50%);
    filter:drop-shadow(0 3px 3px rgba(120,80,60,.18));
    pointer-events:auto;touch-action:none;cursor:grab;
    transition:transform .1s, filter .1s;}
  .prop.dragging{transform:translate(-50%,-50%) scale(1.18);cursor:grabbing;z-index:6;
    filter:drop-shadow(0 8px 8px rgba(120,80,60,.3));}

  .mood-bubble{
    position:absolute;top:6%;left:50%;transform:translateX(-50%);
    background:var(--white);border-radius:18px;padding:8px 16px;
    box-shadow:0 4px 0 var(--shadow);font-weight:800;font-size:16px;color:var(--ink-soft);
    white-space:nowrap;z-index:3;opacity:0;pointer-events:none;
    transition:opacity .3s;
  }
  .mood-bubble.show{opacity:1;}
  .mood-bubble::after{content:"";position:absolute;bottom:-7px;left:50%;transform:translateX(-50%);
    border-left:8px solid transparent;border-right:8px solid transparent;border-top:8px solid var(--white);}

  /* ---------- NEED METERS ---------- */
  .needs{
    display:grid;grid-template-columns:repeat(4,1fr);gap:8px;width:100%;
    padding:6px 2px 2px;flex-shrink:0;
  }
  .need{display:flex;flex-direction:column;align-items:center;gap:3px;}
  .need-emoji{font-size:20px;}
  .need-bar{width:100%;height:11px;border-radius:999px;background:#EFE0D5;overflow:hidden;
    box-shadow:inset 0 1px 2px rgba(120,80,60,.18);}
  .need-fill{height:100%;border-radius:999px;width:100%;transition:width .5s ease, background .4s;}

  /* ---------- ACTION BUTTONS ---------- */
  .actions{
    display:grid;grid-template-columns:repeat(4,1fr);gap:10px;
    padding:10px 16px;flex-shrink:0;
  }
  .act{
    border:none;border-radius:22px;padding:14px 4px 11px;cursor:pointer;
    display:flex;flex-direction:column;align-items:center;gap:3px;
    font-family:'Baloo 2';font-weight:700;font-size:14px;color:var(--white);
    box-shadow:0 5px 0 rgba(0,0,0,.13);transition:transform .08s, box-shadow .08s;
  }
  .act:active{transform:translateY(4px);box-shadow:0 1px 0 rgba(0,0,0,.13);}
  .act .ae{font-size:30px;line-height:1;}
  .act.feed{background:linear-gradient(180deg,#FFB37A,var(--coral-deep));}
  .act.play{background:linear-gradient(180deg,#7FD6FF,var(--sky-deep));}
  .act.wash{background:linear-gradient(180deg,#B5F0D6,var(--mint-deep));}
  .act.sleep{background:linear-gradient(180deg,#D7C6FF,var(--lav-deep));}
  .act:disabled{opacity:.45;filter:grayscale(.3);}

  /* ---------- BOTTOM NAV ---------- */
  .bottomnav{
    display:flex;gap:10px;padding:6px 16px 16px;flex-shrink:0;
  }
  .navbtn{
    flex:1;border:none;border-radius:20px;padding:13px;cursor:pointer;
    font-family:'Baloo 2';font-weight:800;font-size:17px;color:var(--ink);
    background:var(--white);box-shadow:0 5px 0 var(--shadow);
    display:flex;align-items:center;justify-content:center;gap:8px;
    transition:transform .08s, box-shadow .08s;
  }
  .navbtn:active{transform:translateY(4px);box-shadow:0 1px 0 var(--shadow);}
  .navbtn .nb-icon{font-size:22px;}
  .navbtn.alert::after{content:"";position:absolute;}
  .navbtn.alert{position:relative;}
  .navbtn.alert .dot{position:absolute;top:6px;right:14px;width:14px;height:14px;
    background:var(--coral);border-radius:50%;border:2px solid var(--white);
    animation:pulse 1s ease-in-out infinite;}
  @keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.3);}}

  /* ---------- OVERLAYS ---------- */
  .overlay{
    position:absolute;inset:0;background:rgba(90,60,50,.45);
    backdrop-filter:blur(3px);z-index:50;display:none;
    align-items:center;justify-content:center;padding:22px;
  }
  .overlay.show{display:flex;animation:fadein .25s;}
  @keyframes fadein{from{opacity:0;}to{opacity:1;}}
  .sheet{
    background:var(--cream);border-radius:30px;width:100%;max-width:430px;
    max-height:88dvh;overflow-y:auto;padding:22px 20px 24px;
    box-shadow:0 12px 40px rgba(80,50,40,.4);animation:pop .3s cubic-bezier(.2,1.4,.5,1);
    position:relative;
  }
  @keyframes pop{from{transform:scale(.8);opacity:0;}to{transform:scale(1);opacity:1;}}
  .sheet h2{font-family:'Baloo 2';font-weight:800;font-size:26px;text-align:center;margin-bottom:4px;}
  .sheet .sub{text-align:center;color:var(--ink-soft);font-weight:700;margin-bottom:18px;font-size:15px;}
  .close-x{position:absolute;top:14px;right:14px;width:38px;height:38px;border:none;
    border-radius:50%;background:var(--peach);font-size:20px;cursor:pointer;color:var(--coral-deep);
    box-shadow:0 3px 0 var(--shadow);font-weight:800;}
  .close-x:active{transform:translateY(2px);}

  /* collection grid */
  .col-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
  .col-card{
    background:var(--white);border-radius:20px;padding:14px 6px 10px;text-align:center;
    box-shadow:0 4px 0 var(--shadow);position:relative;
  }
  .col-card .ce{font-size:46px;line-height:1;filter:drop-shadow(0 3px 3px rgba(120,80,60,.2));}
  .col-card .cn{font-family:'Baloo 2';font-weight:700;font-size:13px;margin-top:4px;color:var(--ink);}
  .col-card.locked .ce{filter:grayscale(1) brightness(1.6) contrast(.4);opacity:.55;}
  .col-card.locked .cn{color:#C9B8AE;}
  .col-card.active-pet{outline:3px solid var(--mint-deep);outline-offset:-1px;}
  .col-card .pick{margin-top:6px;font-size:11px;font-weight:800;color:var(--mint-deep);}
  .col-card .lvl{position:absolute;top:6px;left:8px;font-size:10px;font-weight:800;
    background:var(--lav);color:var(--white);padding:1px 7px;border-radius:999px;}
  .card-rename{position:absolute;top:4px;right:5px;width:24px;height:24px;border:none;
    border-radius:50%;background:var(--peach);font-size:12px;cursor:pointer;line-height:1;
    box-shadow:0 2px 0 var(--shadow);padding:0;}
  .card-rename:active{transform:translateY(2px);}

  /* egg shop */
  .egg-hero{font-size:120px;text-align:center;line-height:1;margin:6px 0 4px;
    filter:drop-shadow(0 8px 6px rgba(120,80,60,.2));animation:eggwobble 2s ease-in-out infinite;}
  @keyframes eggwobble{0%,100%{transform:rotate(-4deg);}50%{transform:rotate(4deg);}}
  .big-btn{
    width:100%;border:none;border-radius:22px;padding:17px;margin-top:14px;cursor:pointer;
    font-family:'Baloo 2';font-weight:800;font-size:21px;color:var(--white);
    background:linear-gradient(180deg,#FFC25E,var(--coral-deep));
    box-shadow:0 6px 0 #C44A35;transition:transform .08s,box-shadow .08s;
    display:flex;align-items:center;justify-content:center;gap:10px;
  }
  .big-btn:active{transform:translateY(5px);box-shadow:0 1px 0 #C44A35;}
  .big-btn:disabled{filter:grayscale(.5);opacity:.6;}
  .big-btn.mint{background:linear-gradient(180deg,#B5F0D6,var(--mint-deep));box-shadow:0 6px 0 #3A9B74;}

  /* hatch animation */
  .hatch-egg{font-size:130px;text-align:center;animation:hatchshake .35s ease-in-out infinite;}
  @keyframes hatchshake{0%,100%{transform:rotate(-12deg) translateY(0);}25%{transform:rotate(12deg) translateY(-6px);}50%{transform:rotate(-10deg);}75%{transform:rotate(10deg) translateY(-4px);}}
  .reveal-pet{font-size:140px;text-align:center;animation:revealpop .6s cubic-bezier(.2,1.6,.4,1);}
  @keyframes revealpop{from{transform:scale(0) rotate(-30deg);}to{transform:scale(1) rotate(0);}}
  .new-tag{display:inline-block;background:var(--sun-deep);color:var(--white);font-family:'Baloo 2';
    font-weight:800;font-size:14px;padding:3px 14px;border-radius:999px;transform:rotate(-6deg);
    box-shadow:0 3px 0 rgba(120,80,60,.2);}

  /* daily gift */
  .gift-box{font-size:110px;text-align:center;animation:giftbounce .8s ease-in-out infinite;}
  @keyframes giftbounce{0%,100%{transform:translateY(0) scale(1);}50%{transform:translateY(-12px) scale(1.04);}}
  .streak-row{display:flex;justify-content:center;gap:6px;margin:14px 0 4px;flex-wrap:wrap;}
  .streak-day{width:38px;height:46px;border-radius:12px;background:var(--white);
    box-shadow:0 3px 0 var(--shadow);display:flex;flex-direction:column;align-items:center;
    justify-content:center;font-weight:800;font-size:11px;color:var(--ink-soft);}
  .streak-day .sd-icon{font-size:17px;}
  .streak-day.done{background:linear-gradient(180deg,var(--sun),var(--sun-deep));color:var(--white);}
  .streak-day.today{outline:3px solid var(--coral);outline-offset:1px;}

  /* particles */
  .particle{position:absolute;pointer-events:none;z-index:40;font-size:28px;
    animation:floatup 1s ease-out forwards;}
  @keyframes floatup{0%{transform:translateY(0) scale(.5);opacity:1;}
    100%{transform:translateY(-90px) scale(1.3);opacity:0;}}

  .confetti{position:absolute;top:-20px;width:11px;height:11px;border-radius:2px;z-index:60;
    animation:fall linear forwards;}
  @keyframes fall{to{transform:translateY(105vh) rotate(720deg);}}

  /* intro */
  #intro{position:absolute;inset:0;z-index:80;background:
    linear-gradient(180deg,#FFE3D3,#FFD0E0);display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:8px;padding:30px;text-align:center;}
  #intro .title{font-family:'Baloo 2';font-weight:800;font-size:40px;color:var(--coral-deep);
    line-height:1.05;text-shadow:0 4px 0 rgba(255,255,255,.6);}
  #intro .pets-parade{font-size:54px;animation:idle 2s ease-in-out infinite;margin:6px;}
  #intro p{font-weight:800;color:var(--ink-soft);font-size:16px;max-width:300px;}

  .toast{position:absolute;bottom:90px;left:50%;transform:translateX(-50%);
    background:var(--ink);color:var(--white);padding:10px 20px;border-radius:999px;
    font-weight:800;font-size:15px;z-index:70;opacity:0;transition:opacity .3s,transform .3s;white-space:nowrap;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(-8px);}

  /* ---------- FEED MINIGAME ---------- */
  .fg{display:flex;flex-direction:column;align-items:center;gap:6px;}
  .fg-pet{font-size:80px;line-height:1;filter:drop-shadow(0 6px 5px rgba(120,80,60,.18));
    transition:transform .12s;}
  .fg-pet.chomp{animation:chomp .25s;}
  @keyframes chomp{0%,100%{transform:scale(1);}40%{transform:scale(1.15) rotate(-3deg);}70%{transform:scale(.94);}}
  .fg-craving{display:flex;align-items:center;gap:10px;background:var(--white);
    border-radius:999px;padding:8px 20px 8px 16px;box-shadow:0 4px 0 var(--shadow);
    margin:4px 0 2px;animation:cravepop .3s cubic-bezier(.2,1.6,.4,1);}
  .fg-craving .cw{font-family:'Baloo 2';font-weight:800;font-size:16px;color:var(--ink-soft);}
  .fg-craving .ce{font-size:40px;line-height:1;}
  @keyframes cravepop{from{transform:scale(.6);opacity:0;}to{transform:scale(1);opacity:1;}}
  .belly-bar{width:80%;height:18px;border-radius:999px;background:#EFE0D5;overflow:hidden;
    box-shadow:inset 0 1px 3px rgba(120,80,60,.18);margin:4px 0 2px;}
  .belly-fill{height:100%;width:0;border-radius:999px;
    background:linear-gradient(90deg,#FFB37A,#F2674F);transition:width .35s cubic-bezier(.2,1.2,.4,1);}
  .belly-label{font-weight:800;font-size:13px;color:var(--ink-soft);}
  .combo-tag{font-family:'Baloo 2';font-weight:800;font-size:16px;color:var(--coral-deep);
    height:20px;transition:transform .15s;}
  .combo-tag.pop{transform:scale(1.4);}
  .plate{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;width:100%;margin-top:10px;}
  .food{border:none;background:var(--white);border-radius:22px;padding:14px 0;cursor:pointer;
    font-size:46px;line-height:1;box-shadow:0 5px 0 var(--shadow);transition:transform .08s,box-shadow .08s;}
  .food:active{transform:translateY(4px);box-shadow:0 1px 0 var(--shadow);}
  .food.wrong{animation:nono .35s;}
  @keyframes nono{0%,100%{transform:translateX(0);}20%{transform:translateX(-9px) rotate(-6deg);}
    60%{transform:translateX(9px) rotate(6deg);}}
  .food.eaten{animation:flyup .4s forwards;}
  @keyframes flyup{to{transform:translateY(-120px) scale(.2);opacity:0;}}

  /* ---------- MINIGAMES ---------- */
  @keyframes nono{0%,100%{transform:translateX(0);}20%{transform:translateX(-9px) rotate(-6deg);}
    60%{transform:translateX(9px) rotate(6deg);}}
  /* feed: food pads */
  .pad-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:6px 0;}
  .pad{border:none;border-radius:20px;padding:16px 0;font-size:40px;line-height:1;cursor:pointer;
    background:var(--white);box-shadow:0 5px 0 var(--shadow);transition:transform .1s,box-shadow .1s,background .1s;}
  .pad:active{transform:translateY(3px);box-shadow:0 2px 0 var(--shadow);}
  .pad.lit{background:linear-gradient(180deg,#FFE08A,var(--sun-deep));transform:scale(1.06);
    box-shadow:0 5px 0 #C9962B, 0 0 0 4px rgba(255,214,107,.6);}
  .seq-dots{display:flex;justify-content:center;gap:10px;margin-top:10px;}
  .dot-o,.dot-f{width:16px;height:16px;border-radius:50%;}
  .dot-o{background:#EFE0D5;box-shadow:inset 0 1px 2px rgba(120,80,60,.2);}
  .dot-f{background:linear-gradient(180deg,#9EE6C6,var(--mint-deep));}
  /* play: memory cards */
  .match-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:8px 0;}
  .card{border:none;border-radius:16px;aspect-ratio:1;cursor:pointer;font-size:30px;
    background:linear-gradient(180deg,#C9B6FF,var(--lav-deep));color:#fff;
    box-shadow:0 5px 0 #6E54C2;transition:transform .12s;display:grid;place-items:center;}
  .card:active{transform:translateY(3px);}
  .card.up{background:var(--white);box-shadow:0 5px 0 var(--shadow);}
  .card.matched{background:linear-gradient(180deg,#B5F0D6,var(--mint-deep));box-shadow:0 5px 0 #3A9B74;
    animation:matchpop .35s;}
  @keyframes matchpop{0%,100%{transform:scale(1);}50%{transform:scale(1.12);}}
  .card-face{pointer-events:none;}
  /* wash: bubbles */
  .wash-area{position:relative;width:100%;height:270px;border-radius:24px;margin:8px 0;
    background:linear-gradient(180deg,#D7F2FF,#A7DEF5);overflow:hidden;}
  .wash-pet{position:absolute;left:50%;top:52%;transform:translate(-50%,-50%);font-size:78px;opacity:.8;}
  .bubble{position:absolute;transform:translate(-50%,-50%);width:46px;height:46px;border-radius:50%;
    border:3px solid rgba(255,255,255,.8);cursor:pointer;font-family:'Baloo 2';font-weight:800;
    font-size:19px;color:var(--sky-deep);
    background:radial-gradient(circle at 35% 30%, #fff, rgba(154,215,255,.85));
    box-shadow:0 3px 6px rgba(80,120,150,.3);}
  .bubble.pop{animation:bpop .2s forwards;}
  @keyframes bpop{to{transform:translate(-50%,-50%) scale(1.6);opacity:0;}}
  .bubble.shake{animation:nono .35s;}
  /* sleep: sheep counting */
  .sheep-field{display:flex;flex-wrap:wrap;justify-content:center;align-items:center;gap:6px;
    min-height:130px;background:linear-gradient(180deg,#3B3168,#5A4B97);border-radius:24px;
    padding:16px;margin:8px 0;}
  .sheep{font-size:42px;animation:hop 1.4s ease-in-out infinite;}
  .zletter{font-family:'Baloo 2';font-weight:800;color:#fff;display:inline-block;
    padding:1px 5px;line-height:1.15;text-shadow:0 1px 2px rgba(0,0,0,.25);}
  @keyframes hop{0%,100%{transform:translateY(0);}40%{transform:translateY(-12px);}}
  .num-row{display:flex;justify-content:center;gap:14px;margin-top:6px;}
  .num-btn{width:64px;height:64px;border:none;border-radius:18px;cursor:pointer;
    font-family:'Baloo 2';font-weight:800;font-size:30px;color:#fff;
    background:linear-gradient(180deg,#7FD6FF,var(--sky-deep));box-shadow:0 5px 0 #3A86C9;transition:transform .1s;}
  .num-btn:active{transform:translateY(3px);}
  .num-btn.right{background:linear-gradient(180deg,#B5F0D6,var(--mint-deep));box-shadow:0 5px 0 #3A9B74;
    animation:matchpop .35s;}
  .num-btn.wrongnum{animation:nono .35s;}
  /* Z slider answer */
  .z-answer{margin-top:14px;text-align:center;}
  .z-val{font-family:'Baloo 2';font-weight:800;font-size:48px;color:var(--sky-deep);line-height:1;}
  .z-val.z-right{color:var(--mint-deep);animation:matchpop .35s;}
  .z-val.z-shake{animation:nono .35s;}
  .z-slider{-webkit-appearance:none;appearance:none;width:90%;height:14px;border-radius:999px;
    background:#EFE0D5;outline:none;margin:10px 0 2px;}
  .z-slider::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:34px;height:34px;
    border-radius:50%;background:linear-gradient(180deg,#7FD6FF,var(--sky-deep));cursor:pointer;
    box-shadow:0 3px 0 #3A86C9;border:3px solid #fff;}
  .z-slider::-moz-range-thumb{width:34px;height:34px;border-radius:50%;border:3px solid #fff;
    background:var(--sky-deep);cursor:pointer;box-shadow:0 3px 0 #3A86C9;}
  .z-scale{display:flex;justify-content:space-between;width:90%;margin:0 auto;
    font-weight:800;font-size:12px;color:var(--ink-soft);}
  .z-hint{font-weight:800;font-size:14px;color:var(--ink-soft);margin:8px 0 2px;min-height:18px;}

  /* ---------- DECORATE SHOP ---------- */
  .dtabs{display:flex;gap:8px;margin:6px 0 12px;}
  .dtab{flex:1;border:none;border-radius:14px;padding:10px;cursor:pointer;
    font-family:'Baloo 2';font-weight:800;font-size:16px;color:var(--ink-soft);
    background:var(--white);box-shadow:0 3px 0 var(--shadow);}
  .dtab.on{background:linear-gradient(180deg,#FFC25E,var(--coral-deep));color:#fff;box-shadow:0 3px 0 #C44A35;}
  .dtab:active{transform:translateY(2px);}
  .slot-title{font-family:'Baloo 2';font-weight:800;font-size:15px;color:var(--ink);
    margin:14px 2px 8px;text-align:left;}
  .preview-pet{position:relative;display:inline-flex;justify-content:center;align-items:center;
    width:120px;height:110px;margin:2px auto 6px;font-size:84px;line-height:1;
    filter:drop-shadow(0 6px 5px rgba(120,80,60,.18));}
  .preview-pet .pv-pet{position:relative;z-index:2;}
  .preview-pet .pv{position:absolute;left:50%;line-height:1;}
  .preview-pet .pv-hat{top:2px;transform:translate(-50%,-46%);font-size:38px;z-index:3;}
  .preview-pet .pv-neck{bottom:2px;transform:translate(-50%,40%);font-size:30px;z-index:3;}
  .preview-pet .pv-back{top:50%;transform:translate(-50%,-50%);font-size:96px;z-index:1;opacity:.95;}
  .acc-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
  .acc-card{background:var(--white);border-radius:20px;padding:12px 6px 9px;text-align:center;
    box-shadow:0 4px 0 var(--shadow);cursor:pointer;transition:transform .08s,box-shadow .08s;position:relative;}
  .acc-card:active{transform:translateY(3px);box-shadow:0 1px 0 var(--shadow);}
  .acc-card .ae{font-size:42px;line-height:1;}
  .acc-card .an{font-family:'Baloo 2';font-weight:700;font-size:12px;margin-top:3px;color:var(--ink);}
  .acc-card .acost{font-size:12px;font-weight:800;color:var(--coral-deep);margin-top:3px;}
  .acc-card.owned .acost{color:var(--mint-deep);}
  .acc-card.worn{outline:3px solid var(--mint-deep);outline-offset:-1px;}
  .acc-card.cant{opacity:.5;}
  .acc-card .worn-tag{font-size:11px;font-weight:800;color:var(--mint-deep);margin-top:2px;}
  /* backdrop cards */
  .bd-card{background:var(--white);border-radius:20px;padding:8px 6px 9px;text-align:center;
    box-shadow:0 4px 0 var(--shadow);cursor:pointer;transition:transform .08s;position:relative;}
  .bd-card:active{transform:translateY(3px);}
  .bd-card.worn{outline:3px solid var(--mint-deep);outline-offset:-1px;}
  .bd-card.cant{opacity:.5;}
  .bd-swatch{height:42px;border-radius:12px;box-shadow:inset 0 1px 3px rgba(120,80,60,.18);}
  .bd-card .an{font-family:'Baloo 2';font-weight:700;font-size:12px;margin-top:5px;color:var(--ink);}
  .bd-card .acost{font-size:12px;font-weight:800;color:var(--coral-deep);margin-top:2px;}
  .bd-card .worn-tag{font-size:11px;font-weight:800;color:var(--mint-deep);margin-top:2px;}

  /* ---------- NAMING ---------- */
  .name-input{width:100%;border:3px solid var(--peach);border-radius:18px;padding:13px 16px;
    font-family:'Baloo 2';font-weight:700;font-size:22px;color:var(--ink);text-align:center;
    background:var(--white);margin:8px 0 4px;outline:none;}
  .name-input:focus{border-color:var(--coral);}
  .name-chips{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:8px 0 2px;}
  .name-chip{border:none;background:var(--white);border-radius:999px;padding:8px 16px;cursor:pointer;

  .name-chip:active{transform:translateY(2px);}

  .ver{position:absolute;bottom:3px;right:8px;font-size:9px;font-weight:700;
    color:var(--ink-soft);opacity:.4;pointer-events:none;z-index:90;}
  @media (prefers-reduced-motion: reduce){

</style>

<body>
<div id="app">

  <!-- INTRO -->
  <div id="intro">
    <div class="pets-parade">🐱🐶🐰🦊🐼</div>
    <div class="title">Juju's<br>Pet Park</div>
    <p>Take care of your pets and collect them all!</p>
    <button class="big-btn" id="startBtn" style="max-width:240px;margin-top:18px;">▶ Play</button>

  <!-- TOP -->

      <div class="pet-stack" id="petStack">
        <span class="pet-wear pet-back" id="petBack" style="display:none;"></span>
        <span class="pet-wear pet-hat" id="petHat" style="display:none;"></span>

      </div>
    </div>
    <div class="needs">
      <div class="need"><span class="need-emoji">🍎</span><div class="need-bar"><div class="need-fill" id="fill-hunger"></div></div></div>
      <div class="need"><span class="need-emoji">🎾</span><div class="need-bar"><div class="need-fill" id="fill-fun"></div></div></div>
      <div class="need"><span class="need-emoji">🛁</span><div class="need-bar"><div class="need-fill" id="fill-clean"></div></div></div>
      <div class="need"><span class="need-emoji">😴</span><div class="need-bar"><div class="need-fill" id="fill-sleep"></div></div></div>
    </div>

  <!-- ACTIONS -->
  <div class="actions">
    <button class="act feed" data-need="hunger"><span class="ae">🍎</span>Feed</button>

    <button class="navbtn" id="styleBtn"><span class="nb-icon">🎨</span>Decorate</button>
    <button class="navbtn" id="shopBtn"><span class="nb-icon">🥚</span>Eggs</button>
  </div>

  <!-- OVERLAYS -->
  <div class="overlay" id="overlay">
    <div class="sheet" id="sheet"></div>
  </div>

  <div class="toast" id="toast"></div>
  <div class="ver">v2.1 · random images</div>
</div>

<script>
/* ============================================================
   JUJU'S PET PARK
   ============================================================ */

const PETS = [
  {id:'cat',     name:'Mochi',    emoji:'🐱', starter:true},
  {id:'dog',     name:'Biscuit',  emoji:'🐶'},
  {id:'bunny',   name:'Marshmallow', emoji:'🐰'},
  {id:'fox',     name:'Pumpkin',  emoji:'🦊'},
  {id:'panda',   name:'Bamboo',   emoji:'🐼'},
  {id:'penguin', name:'Pebble',   emoji:'🐧'},
  {id:'hamster', name:'Peanut',   emoji:'🐹'},
  {id:'koala',   name:'Gumnut',   emoji:'🐨'},
  {id:'chick',   name:'Sunny',    emoji:'🐥'},
  {id:'frog',    name:'Lily',     emoji:'🐸'},
  {id:'tiger',   name:'Stripes',  emoji:'🐯'},
  {id:'unicorn', name:'Sparkle',  emoji:'🦄'},
  {id:'dragon',  name:'Ember',    emoji:'🐲'},
];

const NEEDS = ['hunger','fun','clean','sleep'];

const ACCESSORIES = [
  // hats (head)
  {id:'bow',     emoji:'🎀', name:'Bow',      cost:20, slot:'hat'},
  {id:'flower',  emoji:'🌸', name:'Flower',   cost:20, slot:'hat'},
  {id:'sunflower',emoji:'🌻',name:'Sunflower',cost:25, slot:'hat'},
  {id:'cap',     emoji:'🧢', name:'Cap',      cost:25, slot:'hat'},
  {id:'sunhat',  emoji:'👒', name:'Sun Hat',  cost:28, slot:'hat'},
  {id:'tophat',  emoji:'🎩', name:'Top Hat',  cost:30, slot:'hat'},
  {id:'star',    emoji:'⭐', name:'Star',     cost:35, slot:'hat'},
  {id:'butterfly',emoji:'🦋',name:'Butterfly',cost:35, slot:'hat'},
  {id:'gradcap', emoji:'🎓', name:'Grad Cap', cost:40, slot:'hat'},
  {id:'crown',   emoji:'👑', name:'Crown',    cost:50, slot:'hat'},
  {id:'rainbowhat',emoji:'🌈',name:'Rainbow', cost:60, slot:'hat'},
  {id:'gem',     emoji:'💎', name:'Gem',      cost:70, slot:'hat'},
  // neck
  {id:'bell',    emoji:'🔔', name:'Bell',     cost:18, slot:'neck'},
  {id:'bowtie',  emoji:'🎀', name:'Bow Tie',  cost:22, slot:'neck'},
  {id:'scarf',   emoji:'🧣', name:'Scarf',    cost:28, slot:'neck'},
  {id:'beads',   emoji:'📿', name:'Beads',    cost:34, slot:'neck'},
  {id:'medal',   emoji:'🏅', name:'Medal',    cost:40, slot:'neck'},
  // back (wings & capes)
  {id:'wings',   emoji:'🪽', name:'Wings',    cost:45, slot:'back'},
  {id:'cape',    emoji:'🦸', name:'Cape',     cost:48, slot:'back'},
  {id:'backpack',emoji:'🎒', name:'Backpack', cost:30, slot:'back'},
  {id:'fairy',   emoji:'🧚', name:'Fairy',    cost:55, slot:'back'},
];
function accById(id){ return ACCESSORIES.find(a=>a.id===id); }

const FILL_COLORS = {
  hunger:'linear-gradient(90deg,#FFB37A,#F2674F)',
  fun:'linear-gradient(90deg,#7FD6FF,#4FA8E8)',
  clean:'linear-gradient(90deg,#B5F0D6,#4FBF93)',
  sleep:'linear-gradient(90deg,#D7C6FF,#9277E0)'
};
const LOW_COLOR = 'linear-gradient(90deg,#FFB3A8,#F2674F)';

const EGG_COST = 30;
const DRAIN_PER_HOUR = 22;      // points each need drops per real hour
// care actions -> growth stage
const STAGES = [
  {label:'Baby',  min:0,   scale:0.62},
  {label:'Kid',   min:30,  scale:0.78},
  {label:'Big',   min:80,  scale:0.92},
  {label:'Grown', min:160, scale:1.05},
];

// wearable accessories now have a slot: hat / neck / back
const SLOTS = ['back','hat','neck'];
const SLOT_LABEL = {hat:'Hats', neck:'Neck', back:'Wings & Capes'};

// room backdrops (gradient behind the pet)
const BACKDROPS = [
  {id:'default', name:'Sunny',  cost:0,  css:'linear-gradient(180deg,#FFF1E0,#FFE9DD)'},
  {id:'garden',  name:'Garden', cost:25, css:'linear-gradient(180deg,#DFF6E3,#BCE9C5)'},
  {id:'sky',     name:'Sky',    cost:25, css:'linear-gradient(180deg,#CFefff,#A7D8F5)'},
  {id:'candy',   name:'Candy',  cost:30, css:'linear-gradient(180deg,#FFE0F0,#FFC9E4)'},
  {id:'night',   name:'Night',  cost:35, css:'linear-gradient(180deg,#3B3168,#5A4B97)'},
  {id:'beach',   name:'Beach',  cost:35, css:'linear-gradient(180deg,#FFF3C9,#FFE08A)'},
];
function backdropById(id){ return BACKDROPS.find(b=>b.id===id) || BACKDROPS[0]; }

// room props (placed in the scene). def = default center position (% of yard).
const PROPS = [
  {id:'plant',   emoji:'🪴', name:'Plant',   cost:15, def:{x:12, y:82}, size:46},
  {id:'flowerbed',emoji:'🌷',name:'Flowers', cost:15, def:{x:88, y:82}, size:42},
  {id:'ball',    emoji:'⚽', name:'Ball',    cost:18, def:{x:26, y:86}, size:40},
  {id:'teddy',   emoji:'🧸', name:'Teddy',   cost:22, def:{x:78, y:84}, size:46},
  {id:'tree',    emoji:'🌳', name:'Tree',    cost:28, def:{x:13, y:74}, size:64},
  {id:'balloon', emoji:'🎈', name:'Balloon', cost:25, def:{x:86, y:18}, size:48},
  {id:'rainbow', emoji:'🌈', name:'Rainbow', cost:35, def:{x:50, y:12}, size:60},
  {id:'star',    emoji:'⭐', name:'Stars',   cost:20, def:{x:16, y:18}, size:34},
];
function propById(id){ return PROPS.find(p=>p.id===id); }

let state = null;

/* ---------- SAVE / LOAD ---------- */
function defaultState(){
  return {
    hearts: 12,
    active: 'cat',
    owned: { cat: newPet('cat') },
    accessories: [],      // owned accessory ids (account-wide)
    backdrop: 'default',  // active room backdrop
    backdrops: ['default'],// owned backdrops
    props: [],            // owned room props
    placed: [],           // props currently shown in the yard
    propPos: {},          // per-prop custom position {id:{x,y}}
    lastSeen: Date.now(),
    streak: 0,
    lastGift: 0,          // day-stamp of last claimed gift
    sound: true,
    seenIntro: false
  };
}
function newPet(id){ return { hunger:80, fun:80, clean:80, sleep:80, care:0, customName:null,
  worn:{hat:null, neck:null, back:null} }; }

// pet's display name: custom if named, else default
function petLabel(id){
  const o = state.owned[id];
  if(o && o.customName) return o.customName;
  return PETS.find(p=>p.id===id).name;
}

// fill in any missing fields on older saves
function migrate(){
  if(!state.accessories) state.accessories = [];
  // the old 'rainbow' hat id was renamed to 'rainbowhat'
  state.accessories = state.accessories.map(a=> a==='rainbow' ? 'rainbowhat' : a);
  if(!state.backdrop) state.backdrop = 'default';
  if(!state.backdrops) state.backdrops = ['default'];
  if(!state.backdrops.includes('default')) state.backdrops.unshift('default');
  if(!state.props) state.props = [];
  if(!state.placed) state.placed = [];
  if(!state.propPos) state.propPos = {};
  for(const id in state.owned){
    const o = state.owned[id];
    if(o.customName === undefined) o.customName = null;
    if(!o.worn){
      // migrate old single-hat model into slot model
      let oldHat = o.hat || null;
      if(oldHat === 'rainbow') oldHat = 'rainbowhat';
      o.worn = {hat:oldHat, neck:null, back:null};
      delete o.hat;
    }
  }
}

function save(){ try{ localStorage.setItem('jujuPetPark', JSON.stringify(state)); }catch(e){} }
function load(){
  try{
    const raw = localStorage.getItem('jujuPetPark');
    if(raw){ state = JSON.parse(raw); migrate(); return true; }
  }catch(e){}
  state = defaultState();
  return false;
}

/* ---------- SOUND (synth, cute) ---------- */
let actx = null;
function audio(){ if(!actx){ try{actx = new (window.AudioContext||window.webkitAudioContext)();}catch(e){} } return actx; }
function blip(freqs, dur=0.12, type='sine', vol=0.18){
  if(!state.sound) return;
  const a = audio(); if(!a) return;
  if(a.state==='suspended') a.resume();
  freqs.forEach((f,i)=>{
    const o=a.createOscillator(), g=a.createGain();
    o.type=type; o.frequency.value=f;
    const t=a.currentTime + i*0.06;
    g.gain.setValueAtTime(0,t);
    g.gain.linearRampToValueAtTime(vol,t+0.02);
    g.gain.exponentialRampToValueAtTime(0.001,t+dur);
    o.connect(g); g.connect(a.destination);
    o.start(t); o.stop(t+dur+0.02);
  });
}
const SND = {
  feed:  ()=>blip([523,659],0.14,'triangle'),
  fun:   ()=>blip([659,880],0.12,'square',0.12),
  clean: ()=>blip([784,988,1175],0.13,'sine'),
  sleep: ()=>blip([392,330],0.22,'sine'),
  happy: ()=>blip([523,659,784,1047],0.16,'triangle'),
  tap:   ()=>blip([440],0.08,'sine',0.1),
  hatch: ()=>blip([523,659,784,1047,1319],0.2,'triangle',0.2),
  gift:  ()=>blip([659,784,1047],0.18,'triangle'),
  coin:  ()=>blip([988,1319],0.1,'square',0.1),
  chomp: ()=>blip([330,294],0.1,'triangle',0.16),
  nono:  ()=>blip([220,196],0.12,'sine',0.1),
  combo: ()=>blip([784,988,1319],0.1,'square',0.13),
};

/* ---------- TIME-BASED NEED DRAIN ---------- */
function applyDrain(){
  const now = Date.now();
  const hours = (now - state.lastSeen) / 3600000;
  if(hours > 0){
    for(const id in state.owned){
      const p = state.owned[id];
      const drop = hours * DRAIN_PER_HOUR;
      NEEDS.forEach(n=>{ p[n] = Math.max(0, p[n] - drop); });
    }
  }
  state.lastSeen = now;
}

/* ---------- RENDER ---------- */
function pet(){ return PETS.find(p=>p.id===state.active); }
function petState(){ return state.owned[state.active]; }
function stageOf(care){
  let s = STAGES[0], idx = 0;
  for(let i=0;i<STAGES.length;i++){ if(care >= STAGES[i].min){ s = STAGES[i]; idx = i; } }
  // progress toward next stage (0..1), and care needed
  let progress = 1, toNext = 0, nextLabel = null;
  if(idx < STAGES.length-1){
    const cur = STAGES[idx].min, nxt = STAGES[idx+1].min;
    progress = (care - cur) / (nxt - cur);
    toNext = nxt - care;
    nextLabel = STAGES[idx+1].label;
  }
  return {label:s.label, scale:s.scale, index:idx, progress, toNext, nextLabel};
}
function stageIndex(care){ return stageOf(care).index; }

function render(){
  document.getElementById('heartCount').textContent = state.hearts;
  const p = pet(), ps = petState();
  document.getElementById('petName').textContent = petLabel(state.active);
  const st = stageOf(ps.care);
  document.getElementById('stageBadge').textContent = st.label;
  const petEl = document.getElementById('petEl');
  const petPx = 130*st.scale;
  petEl.textContent = p.emoji;
  petEl.style.fontSize = petPx+'px';

  // growth progress bar
  const gfill = document.getElementById('growFill');
  const glabel = document.getElementById('growLabel');
  if(gfill){
    if(st.nextLabel){
      gfill.style.width = Math.round(st.progress*100)+'%';
      glabel.textContent = `🌱 ${st.toNext} more to grow into ${st.nextLabel}`;
    } else {
      gfill.style.width = '100%';
      glabel.textContent = '🌟 Fully grown!';
    }
  }

  // wearables by slot
  renderSlot('petBack', ps.worn.back, petPx, 1.28);
  renderSlot('petHat',  ps.worn.hat,  petPx, 0.42);
  renderSlot('petNeck', ps.worn.neck, petPx, 0.34);

  // room backdrop
  document.getElementById('app').style.background = backdropById(state.backdrop).css;

  // room props
  renderProps();

  NEEDS.forEach(n=>{
    const f = document.getElementById('fill-'+n);
    const v = Math.round(ps[n]);
    f.style.width = v + '%';
    f.style.background = v < 30 ? LOW_COLOR : FILL_COLORS[n];
  });

  // happy state if all needs high
  const allHappy = NEEDS.every(n=>ps[n] >= 70);
  document.getElementById('petStack').classList.toggle('happy', allHappy);

  // sound icon
  document.getElementById('soundBtn').textContent = state.sound ? '🔊' : '🔇';

  // gift alert dot
  const shopBtn = document.getElementById('shopBtn');
  shopBtn.classList.toggle('alert', state.hearts >= EGG_COST && lockedCount() > 0);
  let dot = shopBtn.querySelector('.dot');
  if(state.hearts >= EGG_COST && lockedCount() > 0){
    if(!dot){ dot=document.createElement('span'); dot.className='dot'; shopBtn.appendChild(dot);}
  } else if(dot){ dot.remove(); }
}

function renderSlot(elId, accId, petPx, ratio){
  const el = document.getElementById(elId);
  if(!el) return;
  if(accId){
    const acc = accById(accId);
    el.textContent = acc ? acc.emoji : '';
    el.style.fontSize = (petPx*ratio)+'px';
    el.style.display = '';
  } else {
    el.style.display = 'none';
  }
}

let propDragging = false;
function renderProps(){
  if(propDragging) return;   // don't rebuild mid-drag
  const layer = document.getElementById('propLayer');
  if(!layer) return;
  layer.innerHTML = state.placed.map(id=>{
    const pr = propById(id); if(!pr) return '';
    const pos = state.propPos[id] || pr.def;
    return `<span class="prop" data-prop="${id}" style="left:${pos.x}%;top:${pos.y}%;font-size:${pr.size}px;">${pr.emoji}</span>`;
  }).join('');
  layer.querySelectorAll('.prop').forEach(attachPropDrag);
}

function attachPropDrag(el){
  const id = el.dataset.prop;
  let pos = null;
  function down(e){
    propDragging = true;
    document.getElementById('propLayer').classList.add('lift');
    try{ el.setPointerCapture(e.pointerId); }catch(_){}
    el.classList.add('dragging');
    SND.tap();
    e.preventDefault();
  }
  function move(e){
    if(!propDragging) return;
    const yard = document.getElementById('petYard').getBoundingClientRect();
    let x = ((e.clientX - yard.left) / yard.width) * 100;
    let y = ((e.clientY - yard.top) / yard.height) * 100;
    x = Math.max(6, Math.min(94, x));
    y = Math.max(6, Math.min(94, y));
    pos = {x, y};
    el.style.left = x + '%';
    el.style.top = y + '%';
    e.preventDefault();
  }
  function up(){
    if(!propDragging) return;
    propDragging = false;
    document.getElementById('propLayer').classList.remove('lift');
    el.classList.remove('dragging');
    if(pos){ state.propPos[id] = pos; save(); }
  }
  el.addEventListener('pointerdown', down);
  el.addEventListener('pointermove', move);
  el.addEventListener('pointerup', up);
  el.addEventListener('pointercancel', up);
}

function lockedCount(){ return PETS.filter(p=>!state.owned[p.id]).length; }

/* ---------- CARE ACTIONS ---------- */
let moodTimer=null;
function showMood(text){
  const b=document.getElementById('moodBubble');
  b.textContent=text; b.classList.add('show');
  clearTimeout(moodTimer);
  moodTimer=setTimeout(()=>b.classList.remove('show'),1300);
}
// each action launches its own thinking minigame
function openActivity(need){
  SND.tap();
  if(need==='hunger') feedGame();
  else if(need==='fun') playGame();
  else if(need==='clean') washGame();
  else if(need==='sleep') sleepGame();
}

// called when a minigame is won — completes the need fully (no spamming)
function finishActivity(need, hearts, title){
  const ps = petState();
  const beforeStage = stageIndex(ps.care);
  ps[need] = 100;        // one win = fully done
  ps.care += 3;          // counts toward growth
  const grew = stageIndex(ps.care) > beforeStage;
  if(NEEDS.every(n=>ps[n]>=70)){ ps._wasHappy = true; }
  SND.happy(); confetti(20);
  openSheet(`
    <div class="reveal-pet" style="font-size:104px;">${pet().emoji}</div>
    <h2>${title}</h2>
    <div class="sub">+💖${hearts}</div>
    <button class="big-btn mint" id="actDone">Yay!</button>
  `);
  document.getElementById('actDone').addEventListener('click',()=>{
    addHearts(hearts); SND.coin();
    save(); render(); closeSheet();
    if(grew) celebrateGrowth(); else welcomePet();
  });
  save();
}

// pet just advanced a growth stage
function celebrateGrowth(){
  const ps = petState();
  const st = stageOf(ps.care);
  SND.hatch(); confetti(28);
  addHearts(5);                       // growth reward
  const petStack = document.getElementById('petStack');
  petStack.classList.remove('growpop'); void petStack.offsetWidth; petStack.classList.add('growpop');
  openSheet(`
    <div class="reveal-pet">${pet().emoji}</div>
    <h2>${petLabel(state.active)} grew up! 🎉</h2>
    <div class="sub">Now a <b>${st.label}</b>! Here's +💖5</div>
    <button class="big-btn mint" id="growOk">Yay!</button>
  `);
  document.getElementById('growOk').addEventListener('click',()=>{ closeSheet(); render(); save(); });
}

function bounceePet(){
  const el=document.getElementById('petEl');
  el.style.transform='scale(1.12)';
  setTimeout(()=>el.style.transform='',120);
}

function addHearts(n){
  state.hearts += n;
  const pill=document.querySelector('.hearts-pill');
  pill.style.transform='scale(1.18)';
  setTimeout(()=>pill.style.transform='',150);
  document.getElementById('heartCount').textContent=state.hearts;
}

const NEED_EMOJI={hunger:'🍎',fun:'🎾',clean:'🫧',sleep:'💤'};
function burstParticles(need){
  const yard=document.getElementById('petYard');
  const r=yard.getBoundingClientRect();
  for(let i=0;i<5;i++){
    const s=document.createElement('span');
    s.className='particle';
    s.textContent= Math.random()<0.5 ? NEED_EMOJI[need] : '💖';
    s.style.left=(r.width/2 + (Math.random()*120-60))+'px';

function confetti(n){

  openSheet(`<h2>Hatching...</h2><div class="hatch-egg">🥚</div><div class="sub">Wiggle wiggle...</div>`);

    if(state.hearts < pr.cost){ SND.nono(); toast('Need 💖'+pr.cost+' for '+pr.name); return; }

    save(); render(); openRoomTab();
    toast('Placed! Drag it where you like ✋');

function dayStamp(d=new Date()){ return d.getFullYear()*1000 + (d.getMonth()*31+d.getDate()); }
function checkDailyGift(){
  const today=dayStamp();
  if(state.lastGift===today) return false; // already claimed today
  // streak logic

/* ---------- FEED: "Yummy Order" — repeat the food sequence ---------- */
const FOOD_POOL = ['🍓','🍌','🍪','🍎','🍉','🍇','🍒','🍑','🥕','🌽','🍕','🍔','🍩','🍰','🧀','🍗','🍫','🍿','🥨','🍦','🍭','🥝','🍍','🥦'];
function feedGame(){
  const mistakes = {n:0};
  const seqLen = 8;
  const padFoods = [...FOOD_POOL].sort(()=>Math.random()-0.5).slice(0,6); // 6 random foods, new each time
  const seq = Array.from({length:seqLen}, ()=>padFoods[Math.floor(Math.random()*padFoods.length)]);
  let input = [];
  let accepting = false;

  openSheet(`
    <h2>Yummy Order 🍴</h2>
    <div class="sub" id="feedSub">Watch what ${petLabel(state.active)} wants!</div>
    <div class="reveal-pet" style="font-size:74px;margin:2px auto 6px;">${pet().emoji}</div>
    <div class="pad-grid" id="padGrid">
      ${padFoods.map((f,i)=>`<button class="pad" data-i="${i}" disabled>${f}</button>`).join('')}
    </div>
    <div class="seq-dots" id="seqDots">${seq.map(()=>'<span class="dot-o"></span>').join('')}</div>
  `);

  const pads = [...sheet.querySelectorAll('.pad')];
  function flash(idx, cb){
    const target = pads.find(p=>padFoods[+p.dataset.i]===seq[idx]);
    if(!target || !document.getElementById('padGrid')) return;   // sheet closed
    target.classList.add('lit'); SND.feed();
    setTimeout(()=>{ target.classList.remove('lit'); cb&&cb(); }, 520);
  }
  function playSeq(){
    accepting = false;
    const sub = document.getElementById('feedSub');
    if(!sub) return;                       // sheet closed — stop
    sub.textContent = `Watch what ${petLabel(state.active)} wants!`;
    let i=0;
    (function step(){
      if(!document.getElementById('padGrid')) return;   // sheet gone
      if(i>=seq.length){ accepting=true; const s=document.getElementById('feedSub'); if(s) s.textContent='Your turn! Tap them in order'; return; }
      flash(i, ()=>{ i++; setTimeout(step,180); });
    })();
  }
  function markDots(){
    const dots=[...document.getElementById('seqDots').children];
    dots.forEach((d,i)=>d.className = i<input.length ? 'dot-f' : 'dot-o');
  }
  pads.forEach(p=>{
    p.disabled=false;
    p.addEventListener('click',()=>{
      if(!accepting) return;
      const emoji = padFoods[+p.dataset.i];
      p.classList.add('lit'); setTimeout(()=>p.classList.remove('lit'),200);
      input.push(emoji);
      const idx = input.length-1;
      if(emoji !== seq[idx]){
        SND.nono(); mistakes.n++;
        input=[]; markDots();
        document.getElementById('feedSub').textContent='Oops! Watch again 👀';
        accepting=false;
        setTimeout(playSeq, 800);
        return;
      }
      SND.feed(); markDots();
      if(input.length===seq.length){
        accepting=false;
        const hearts = mistakes.n===0 ? 7 : 4;
        setTimeout(()=>finishActivity('hunger', hearts, mistakes.n===0?'Perfect order! 😋':'Yummy! 😋'), 350);
      }
    });
  });
  setTimeout(playSeq, 600);
}

/* ---------- PLAY: "Find the Pairs" — memory match ---------- */
const TOY_SET = ['🎾','⚽','🪀','🧸','🎈','🪁','🎯','🔔','🚗','🪅','🎲','🧩','🏀','🎸','🦖','🚀','🎁','⭐','🌈','🍭'];
function playGame(){
  // 8 pairs = 16 cards, random toys each time
  const chosen = [...TOY_SET].sort(()=>Math.random()-0.5).slice(0,8);
  let deck = [...chosen, ...chosen].sort(()=>Math.random()-0.5);
  let flipped = [];       // indices currently face up (unmatched)
  let matched = [];       // matched indices
  let busy = false;
  let mistakes = 0;

  openSheet(`
    <h2>Find the Pairs 🎾</h2>
    <div class="sub">Tap two cards to find a match!</div>
    <div class="match-grid" id="matchGrid">
      ${deck.map((t,i)=>`<button class="card" data-i="${i}"><span class="card-face">❓</span></button>`).join('')}
    </div>
  `);
  const cards=[...sheet.querySelectorAll('.card')];
  function show(i){ cards[i].classList.add('up'); cards[i].querySelector('.card-face').textContent=deck[i]; }
  function hide(i){ cards[i].classList.remove('up'); cards[i].querySelector('.card-face').textContent='❓'; }
  cards.forEach(c=>{
    c.addEventListener('click',()=>{
      const i=+c.dataset.i;
      if(busy || flipped.includes(i) || matched.includes(i)) return;
      show(i); SND.tap(); flipped.push(i);
      if(flipped.length===2){
        const [a,b]=flipped;
        if(deck[a]===deck[b]){
          matched.push(a,b); flipped=[];
          cards[a].classList.add('matched'); cards[b].classList.add('matched');
          SND.coin();
          if(matched.length===deck.length){
            const hearts = mistakes===0 ? 7 : 4;
            setTimeout(()=>finishActivity('fun', hearts, mistakes===0?'All matched! 🎉':'Great playing! 🎾'), 400);
          }
        } else {
          busy=true; mistakes++; SND.nono();
          setTimeout(()=>{ hide(a); hide(b); flipped=[]; busy=false; }, 800);
        }
      }
    });
  });
}

/* ---------- WASH: "Bubble Pop" — moving bubbles, order changes ---------- */
function washGame(){
  const st = stageOf(petState().care);
  const N = st.index>=2 ? 12 : 10;          // more bubbles
  const ascending = Math.random() < 0.5;    // order flips every round
  let idx=0, mistakes=0;
  const pool=[]; for(let i=1;i<=40;i++) pool.push(i);
  for(let i=pool.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [pool[i],pool[j]]=[pool[j],pool[i]]; }
  const nums = pool.slice(0,N);
  const order = [...nums].sort((a,b)=> ascending ? a-b : b-a);
  const spots=[];
  for(let i=0;i<N;i++){
    let x,y,tries=0;
    do{ x=11+Math.random()*78; y=12+Math.random()*68; tries++; }
    while(tries<40 && spots.some(s=>Math.abs(s.x-x)<12 && Math.abs(s.y-y)<12));
    spots.push({x,y});
  }
  openSheet(`
    <h2>Bubble Pop 🫧</h2>
    <div class="sub">Pop them <b>${ascending?'smallest → biggest':'biggest → smallest'}</b>!</div>
    <div class="wash-area" id="washArea">
      <div class="wash-pet">${pet().emoji}</div>
      ${nums.map((n,i)=>`<button class="bubble" data-n="${n}" style="left:${spots[i].x}%;top:${spots[i].y}%;">${n}</button>`).join('')}
    </div>
    <div class="sub" id="washHint" style="margin-top:10px;">${N} bubbles left</div>
  `);
  const bubbleEls = [...sheet.querySelectorAll('.bubble')];
  // movement state
  const mov = bubbleEls.map((el,i)=>({
    el, x:spots[i].x, y:spots[i].y, dead:false,
    vx:(Math.random()<.5?-1:1)*(0.10+Math.random()*0.16),
    vy:(Math.random()<.5?-1:1)*(0.10+Math.random()*0.16)
  }));
  let raf;
  function tick(){
    if(!document.getElementById('washArea')){ if(raf) cancelAnimationFrame(raf); return; } // sheet closed
    mov.forEach(m=>{
      if(m.dead) return;
      m.x+=m.vx; m.y+=m.vy;
      if(m.x<7){m.x=7;m.vx=Math.abs(m.vx);} if(m.x>93){m.x=93;m.vx=-Math.abs(m.vx);}
      if(m.y<8){m.y=8;m.vy=Math.abs(m.vy);} if(m.y>90){m.y=90;m.vy=-Math.abs(m.vy);}
      m.el.style.left=m.x+'%'; m.el.style.top=m.y+'%';
    });
    raf=requestAnimationFrame(tick);
  }
  if(typeof requestAnimationFrame==='function') raf=requestAnimationFrame(tick);

  bubbleEls.forEach((b,i)=>{
    b.addEventListener('click',()=>{
      const n=+b.dataset.n;
      if(n===order[idx]){
        mov[i].dead=true;
        b.classList.add('pop'); SND.clean();
        setTimeout(()=>b.remove(),200);
        idx++;
        const hint=document.getElementById('washHint');
        if(hint) hint.textContent = idx<N ? (N-idx)+' bubbles left' : 'All clean! ✨';
        if(idx>=N){
          if(raf) cancelAnimationFrame(raf);
          const hearts = mistakes===0 ? 7 : 4;
          setTimeout(()=>finishActivity('clean', hearts, mistakes===0?'Squeaky clean! ✨':'All clean! 🫧'), 350);
        }
      } else {
        SND.nono(); mistakes++;
        b.classList.add('shake'); setTimeout(()=>b.classList.remove('shake'),350);
      }
    });
  });
}

/* ---------- SLEEP: "Count the Z" — count Z's among other letters ---------- */
function sleepGame(){
  const st = stageOf(petState().care);
  const big = st.index>=2;
  const zCount = big ? (13 + Math.floor(Math.random()*7))   // 13..19
                     : (11 + Math.floor(Math.random()*5));  // 11..15 (always >10)
  const alpha = 'ABCDEFGHIJKLMNOPQRSTUVWXY'.split('');       // distractors (no Z)
  const dCount = 16 + Math.floor(Math.random()*13);         // 16..28 other letters (more rows)
  let field = [...Array(zCount).fill('Z')];
  for(let i=0;i<dCount;i++) field.push(alpha[Math.floor(Math.random()*alpha.length)]);
  for(let i=field.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [field[i],field[j]]=[field[j],field[i]]; }
  let mistakes=0;
  const SMIN=10, SMAX=20, start=Math.round((SMIN+SMAX)/2);

  openSheet(`
    <h2>Count the Z 💤</h2>
    <div class="sub">How many <b>Z</b>? (zzz...)</div>
    <div class="sheep-field" id="sheepField">
      ${field.map(e=>{ const sz=20+Math.floor(Math.random()*22); return `<span class="zletter" style="font-size:${sz}px">${e}</span>`; }).join('')}
    </div>
    <div class="z-answer">
      <div class="z-val" id="zVal">${start}</div>
      <input type="range" class="z-slider" id="zSlider" min="${SMIN}" max="${SMAX}" value="${start}" step="1">
      <div class="z-scale"><span>${SMIN}</span><span>${SMAX}</span></div>
      <div class="z-hint" id="zHint">Slide to your answer, then Confirm</div>
      <button class="big-btn mint" id="zConfirm">Confirm</button>
    </div>
  `);
  const slider=document.getElementById('zSlider');
  const valEl=document.getElementById('zVal');
  slider.addEventListener('input',()=>{ valEl.textContent=slider.value; });
  document.getElementById('zConfirm').addEventListener('click',()=>{
    const g=+slider.value;
    if(g===zCount){
      valEl.classList.add('z-right'); SND.sleep();
      const hearts = mistakes===0 ? 7 : 4;
      setTimeout(()=>finishActivity('sleep', hearts, mistakes===0?'Counted right! 😴':'Sweet dreams! 💤'), 450);
    } else {
      mistakes++; SND.nono();
      valEl.classList.remove('z-shake'); void valEl.offsetWidth; valEl.classList.add('z-shake');
      document.getElementById('zHint').textContent = 'Not quite — count again!';
    }
  });
}

/* ---------- WELCOME ANIMATION ---------- */
function welcomePet(){
  const el=document.getElementById('petStack');
  el.classList.add('welcome');
  setTimeout(()=>el.classList.remove('welcome'),1700);
}

/* ---------- INIT ---------- */
function start(){
  applyDrain();
  render();
  document.getElementById('intro').style.display='none';
  state.seenIntro=true;
  if(audio() && actx.state==='suspended') actx.resume();
  welcomePet();
  // daily gift after a short beat
  setTimeout(()=>{ if(checkDailyGift()) openDailyGift(); }, 700);
  save();
}

document.getElementById('startBtn').addEventListener('click',start);

// care buttons
document.querySelectorAll('.act').forEach(btn=>{
  btn.addEventListener('click',()=>openActivity(btn.dataset.need));
});
// pet tap = little reaction
document.getElementById('petEl').addEventListener('click',()=>{
  SND.tap(); bounceePet();
  const cheers=['Hi! 👋','Hehe!','💕','I love you!','Boop!'];
  showMood(cheers[Math.floor(Math.random()*cheers.length)]);
});
document.getElementById('collectionBtn').addEventListener('click',openCollection);
document.getElementById('petNameTag').addEventListener('click',()=>openRename(state.active));
document.getElementById('styleBtn').addEventListener('click',()=>openStyleShop('pet'));
document.getElementById('shopBtn').addEventListener('click',openShop);
document.getElementById('soundBtn').addEventListener('click',()=>{
  state.sound=!state.sound;
  render(); save();
  if(state.sound) SND.coin();
  toast(state.sound?'Sound on 🔊':'Sound off 🔇');
});

// slow live drain while playing (gentle) + autosave
setInterval(()=>{
  if(!state || !state.seenIntro) return;
  const ps=petState();
  NEEDS.forEach(n=>{ ps[n]=Math.max(0, ps[n]-0.4); });
  state.lastSeen=Date.now();
  // recheck happy flag
  if(!NEEDS.every(n=>ps[n]>=70)) ps._wasHappy=false;
  render(); save();
}, 8000);

// save the moment the app is hidden or closed (mobile-safe)
function saveOnExit(){
  if(state && state.seenIntro){ state.lastSeen=Date.now(); save(); }
}
document.addEventListener('visibilitychange',()=>{ if(document.hidden) saveOnExit(); });
window.addEventListener('pagehide', saveOnExit);
window.addEventListener('beforeunload', saveOnExit);

// boot
load();
if(state.seenIntro){
  document.getElementById('intro').style.display='none';
  applyDrain(); render(); welcomePet();
  setTimeout(()=>{ if(checkDailyGift()) openDailyGift(); }, 600);
} else {
  render();
}
</script>
